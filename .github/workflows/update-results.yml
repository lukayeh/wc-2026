name: Update Results

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node update-results.js
      - name: Commit and push changes
        run: |
          git config user.name "wc-update-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json index.html
          git diff --cached --quiet || git commit -m "auto: update match results"
          git push
