<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WC 2026 Sweepstakes</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0c1428;color:#e0e0e0;padding:2rem 1rem;min-height:100vh}
h1{text-align:center;font-size:clamp(1.8rem,5vw,3rem);color:#ef4444;margin-bottom:.25rem;letter-spacing:.05em;text-transform:uppercase}
.subtitle{text-align:center;color:#8a9aba;font-size:1rem;margin-bottom:2rem}
table{width:100%;max-width:700px;margin:0 auto 2rem;border-collapse:collapse;background:#141e38;border-radius:12px;overflow:hidden;border:1px solid #2a4070}
th{background:#1c2848;color:#ef4444;font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:.04em;padding:.6rem .5rem}
td{text-align:center;padding:.5rem .3rem;font-size:.9rem;border-top:1px solid #1c2848}
tr:first-child td{border-top:none}
tr td:first-child{text-align:left;padding-left:.75rem;font-weight:600;color:#f5f5f5}
.pos{color:#6a8aaa;font-size:.8rem;width:2rem}
.pts{color:#ef4444;font-weight:700;font-size:1rem}
.w{color:#4ade80}
.d{color:#facc15}
.l{color:#f87171}
.pld{color:#7a9aaa}
.section-header{display:flex;align-items:center;gap:1rem;text-align:center;font-size:.75rem;text-transform:uppercase;letter-spacing:.18em;color:#3b82f6;margin-bottom:.75rem;margin-top:2rem}
.section-header:first-child{margin-top:0}
.section-header::before,.section-header::after{content:'';flex:1;height:1px;background:#2a4070}
#survival{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;margin-bottom:2rem}
.surv-item{display:flex;align-items:center;gap:.5rem;background:#141e38;border-radius:999px;padding:.35rem .75rem .35rem .5rem;border:1px solid #2a4070;font-size:.8rem}
.surv-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff;flex-shrink:0}
.surv-bar{display:flex;gap:2px;height:10px;align-items:center}
.surv-dot{width:8px;height:8px;border-radius:2px;background:#2a4070}
.surv-dot.alive{background:#3b82f6}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:1.5rem;max-width:1290px;margin:0 auto}
.card{background:linear-gradient(145deg,#141e38,#182244);border-radius:16px;padding:1.5rem;border:1px solid #2a4070;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.card-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:2px solid #2a4070}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;color:#fff;flex-shrink:0}
.name{font-size:1.35rem;font-weight:700;color:#f5f5f5}
.count{color:#6a8aaa;font-size:.85rem;margin-left:auto}
.teams{display:grid;grid-template-columns:1fr 1fr;gap:.35rem}
.team{font-size:.92rem;padding:.3rem .5rem;border-radius:6px;background:rgba(255,255,255,.04);color:#d0d8d0;white-space:nowrap;display:flex;align-items:center;gap:.3rem}
.flag{width:20px;height:15px;border-radius:2px;object-fit:cover;flex-shrink:0}
.eliminated{opacity:.35;text-decoration:line-through}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 auto 2rem;max-width:700px}
.trophies{display:flex;gap:1rem;justify-content:center;margin-bottom:2rem;flex-wrap:wrap}
.trophy{display:flex;align-items:center;gap:.75rem;border-radius:12px;padding:.6rem 1rem;min-width:200px;border:1px solid}
.trophy-main{background:linear-gradient(135deg,#3a1010,#1a0808);border-color:#ef4444;box-shadow:0 0 16px rgba(239,68,68,.15)}
.trophy-pts{background:linear-gradient(135deg,#0a0a2a,#08081a);border-color:#3b82f6;box-shadow:0 0 16px rgba(59,130,246,.1)}
.trophy-icon{font-size:1.6rem;flex-shrink:0}
.trophy-body{display:flex;flex-direction:column}
.trophy-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.05em;color:#6a8aaa}
.trophy-name{font-size:1rem;font-weight:700;color:#f5f5f5}
.trophy-stat{font-size:.8rem;color:#7a9aaa}
.trophy-close{margin-left:auto;cursor:pointer;font-size:1.1rem;color:#4a5a7a;background:none;border:none;padding:0;line-height:1;flex-shrink:0;align-self:flex-start}
.trophy-close:hover{color:#f5f5f5}
.trophy-sep{align-self:center;width:1px;height:48px;background:#2a4070;flex-shrink:0;display:none}
.trophy-sep.show{display:block}
.match-bar{display:flex;gap:.75rem;justify-content:center;margin-bottom:2rem;flex-wrap:wrap}
.match-btn{background:#141e38;border:1px solid #2a4070;color:#c0d0c0;padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-size:.85rem;transition:border-color .2s,color .2s}
.match-btn:hover{border-color:#3b82f6;color:#f5f5f5}
.match-list{list-style:none;padding:0;margin:0}
.match-list li{display:flex;align-items:center;gap:.35rem;padding:.4rem 0;border-bottom:1px solid #2a4070;font-size:.85rem;flex-wrap:wrap}
.match-list li:last-child{border-bottom:none}
.match-list .score{font-weight:700;color:#f5f5f5;min-width:2rem;text-align:center}
.match-list .vs{color:#5a7aaa;font-size:.75rem}
.match-list .match-stage{color:#6a8aaa;font-size:.7rem;text-transform:uppercase}
.match-list .match-date{color:#5a7aaa;font-size:.7rem;margin-left:auto}
.rec-dots{display:inline-flex;align-items:center;gap:2px;margin-left:3px;flex-shrink:0}
.rec-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.rec-w-dot{background:#4ade80}
.rec-d-dot{background:#facc15}
.rec-l-dot{background:#f87171}
.last-updated{text-align:center;color:#5a7aaa;font-size:.75rem;margin-top:.35rem;margin-bottom:1.25rem}
.info-btn{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;border:1px solid #2a4070;cursor:pointer;color:#6a8aaa;font-size:.9rem;background:transparent;vertical-align:middle;margin-left:.5rem;transition:border-color .2s,color .2s}
.info-btn:hover{color:#ef4444;border-color:#ef4444}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:#182244;border:1px solid #2a4070;border-radius:16px;padding:2rem;max-width:440px;width:100%;position:relative}
.modal-close{position:absolute;top:.75rem;right:.75rem;cursor:pointer;font-size:1.2rem;color:#6a8aaa;background:none;border:none;padding:0;line-height:1}
.modal-close:hover{color:#f5f5f5}
.modal h2{color:#ef4444;font-size:1.1rem;margin-bottom:.75rem;letter-spacing:.02em}
.modal p{color:#c0d0c0;font-size:.9rem;line-height:1.6;margin-bottom:.75rem}
.modal .hl-gold{color:#ef4444;font-weight:600}
.modal .hl-blue{color:#60a5fa;font-weight:600}
@media(max-width:640px){.trophies{gap:.5rem}.trophy{min-width:0;width:100%;padding:.5rem .75rem}.trophy-sep.show{display:none}}
@media(max-width:640px){body{padding:1rem .75rem}.grid{grid-template-columns:1fr;gap:1rem}.teams{grid-template-columns:1fr 1fr}.card{padding:.85rem}.team{font-size:.82rem;gap:.25rem}.table-wrap{margin-bottom:1.5rem}td{font-size:.75rem;padding:.35rem .2rem}th{font-size:.7rem;padding:.4rem .25rem}.flag{width:16px;height:12px}.surv-item{font-size:.7rem;padding:.25rem .5rem;gap:.35rem}.match-list li{font-size:.78rem;gap:.25rem}.match-list .match-stage{font-size:.6rem}}
</style>
</head>

      if (t1 || t2) {

        if (t1 && m.goals1 > m.goals2) w++
        else if (t2 && m.goals2 > m.goals1) w++
        else if (t1 && m.goals1 === m.goals2) dr++

  }

    wcHtml = '<div class="trophy trophy-main"><span class="trophy-icon">\u{1F3C6}</span><div class="trophy-body"><span class="trophy-label">World Cup Champion</span><span class="trophy-name">' + wcName + '</span><span class="trophy-stat">' + wcStat + '</span></div><button class="trophy-close" onclick="this.parentElement.style.display=\'none\'">\u2715</button></div>'
  }

  trophiesEl.innerHTML = wcHtml + (d.matches.length ? '<div class="trophy-sep show"></div>' : '') + ptsHtml

  var standingsEl = document.getElementById('standings')
  var cardsEl = document.getElementById('cards')

  if (playerStats.length && d.matches.length) {
    var tableHtml = '<table><thead><tr><th></th><th>Player</th><th>Pld</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th><th>Alive</th></tr></thead><tbody>'
    for (var i = 0; i < playerStats.length; i++) {
      var p = playerStats[i]
      var idx = playerIndex[p.name]
      var gd = p.gd > 0 ? '+' + p.gd : p.gd
      tableHtml += '<tr>'
      tableHtml += '<td class="pos">' + (i + 1) + '</td>'
      tableHtml += '<td style="display:flex;align-items:center;gap:.5rem;padding-left:.75rem"><span style="display:inline-flex;width:24px;height:24px;border-radius:50%;background:' + colors[idx] + ';color:#fff;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0">' + avatars[idx] + '</span>' + p.name + '</td>'
      tableHtml += '<td class="pld">' + p.pld + '</td>'
      tableHtml += '<td class="w">' + p.w + '</td>'
      tableHtml += '<td class="d">' + p.dr + '</td>'
      tableHtml += '<td class="l">' + p.l + '</td>'
      tableHtml += '<td>' + p.gf + '</td>'
      tableHtml += '<td>' + p.ga + '</td>'
      tableHtml += '<td>' + gd + '</td>'
      tableHtml += '<td class="pts">' + p.pts + '</td>'
      var alive = p.teams.length - (p.eliminated ? p.eliminated.length : 0)
      tableHtml += '<td style="color:' + (alive < 6 ? '#f87171' : alive < 10 ? '#facc15' : '#3b82f6') + '">' + alive + '/' + p.teams.length + '</td>'
      tableHtml += '</tr>'
    }
    tableHtml += '</tbody></table>'
    standingsEl.innerHTML = '<div class="table-wrap">' + tableHtml + '</div>'
  } else {
    standingsEl.innerHTML = '<p style="text-align:center;color:#5a7aaa;margin-bottom:2rem">No matches yet.</p>'
  }

  var cardsHtml = ''
  for (var i = 0; i < d.players.length; i++) {
    var p = d.players[i]
    var stats = null
    for (var j = 0; j < playerStats.length; j++) {
      if (playerStats[j].name === p.name) { stats = playerStats[j]; break }
    }
    var teamsHtml = ''
    for (var j = 0; j < p.teams.length; j++) {
      var t = p.teams[j]
      var flagSrc = d.flagCodes[t] ? 'https://flagcdn.com/20x15/' + d.flagCodes[t] + '.png' : ''
      var elim = p.eliminated && p.eliminated.indexOf(t) !== -1
      var rec = teamRecord[t]
      var recStr = ''
      if (rec && (rec.w + rec.d + rec.l) > 0) {
        var dots = ''
        for (var x = 0; x < rec.w; x++) dots += '<span class="rec-dot rec-w-dot"></span>'
        for (var x = 0; x < rec.d; x++) dots += '<span class="rec-dot rec-d-dot"></span>'
        for (var x = 0; x < rec.l; x++) dots += '<span class="rec-dot rec-l-dot"></span>'
        recStr = '<span class="rec-dots">' + dots + '</span>'
      }
      teamsHtml += '<span class="team' + (elim ? ' eliminated' : '') + '"><img class="flag" src="' + flagSrc + '" alt="" loading="lazy">' + t + recStr + '</span>'
    }
    cardsHtml += '<div class="card">'
    cardsHtml += '<div class="card-header">'
    cardsHtml += '<div class="avatar" style="background:' + colors[i] + '">' + avatars[i] + '</div>'
    cardsHtml += '<span class="name">' + p.name + '</span>'
    cardsHtml += '<span class="count">' + (d.matches.length ? stats.pts + ' pts' : '12 teams') + '</span>'
    cardsHtml += '</div>'
    cardsHtml += '<div class="teams">' + teamsHtml + '</div>'
    cardsHtml += '</div>'
  }
  cardsEl.innerHTML = cardsHtml

  // last updated
  var luEl = document.getElementById('lastUpdated')
  if (d.lastUpdated) {
    var d2 = new Date(d.lastUpdated)
    var parts = [d2.getDate(), d2.toLocaleString('en-GB',{month:'short'}), d2.getFullYear()]
    var time = d2.toLocaleString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false})
    luEl.textContent = 'Last updated: ' + parts.join(' ') + ', ' + time
  }
})(DATA)

function toggleInfo(){
  var el=document.getElementById('infoModal')
  if(el){el.remove();return}
  var m=document.createElement('div')
  m.className='modal-overlay'
  m.id='infoModal'
  m.onclick=function(e){if(e.target===this)this.remove()}
  m.innerHTML='<div class="modal"><button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">\u2715</button><h2>How It Works</h2><p><span class="hl-gold">World Cup Champion</span> \u2014 The player whose last team gets eliminated last wins the prize. Last team standing.</p><p><span class="hl-blue">Most Points</span> \u2014 Bragging rights go to whoever accumulates the most points across all their teams.</p><h2>Points</h2><p><span class="w">Win</span> = 3 pts &middot; <span class="d">Draw</span> = 1 pt &middot; <span class="l">Loss</span> = 0 pts</p><p>All 104 tournament matches count (group stage + knockout).</p></div>'
  document.body.appendChild(m)
}

function showPrevGames(){
  closeModal()
  var sorted = DATA.matches.slice().sort(function(a,b){ return (b.date||'').localeCompare(a.date||'') })
  var games = sorted.slice(0, 3)
  showMatchModal('Previous 3 Games', games, true)
}

function showNextGames(){
  closeModal()
  var played = {}
  DATA.matches.forEach(function(m){ played[m.team1 + '-' + m.team2] = true })
  var upcoming = (DATA.schedule || []).filter(function(g){ return !played[g.team1 + '-' + g.team2] })
  var games = upcoming.slice(0, 3)
  showMatchModal('Next 3 Games', games, false)
}

function showMatchModal(title, games, scored){
  var m = document.createElement('div')
  m.className = 'modal-overlay'
  m.id = 'infoModal'
  m.onclick = function(e){ if(e.target === this) this.remove() }
  var html = '<div class="modal"><button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">\u2715</button><h2>' + title + '</h2>'
  if (!games.length) {
    html += '<p style="color:#6a8aaa">No games to show.</p>'
  } else {
    html += '<ul class="match-list">'
    for (var i = 0; i < games.length; i++) {
      var g = games[i]
      html += '<li>'
      if (scored) {
        html += '<span class="team-name" style="flex:1;font-weight:500;display:flex;align-items:center">' + ownerBadge(g.team1) + g.team1 + '</span><span class="score">' + g.goals1 + '-' + g.goals2 + '</span><span class="team-name" style="flex:1;font-weight:500;text-align:right;display:flex;align-items:center;justify-content:flex-end">' + ownerBadge(g.team2) + g.team2 + '</span>'
      } else {
        html += '<span class="team-name" style="flex:1;font-weight:500;display:flex;align-items:center">' + ownerBadge(g.team1) + g.team1 + '</span><span class="vs">vs</span><span class="team-name" style="flex:1;font-weight:500;text-align:right;display:flex;align-items:center;justify-content:flex-end">' + ownerBadge(g.team2) + g.team2 + '</span>'
      }
      html += '<span class="match-stage">' + g.stage + '</span>' + '<span class="match-date">' + g.date + '</span>'
      html += '</li>'
    }
    html += '</ul>'
  }
  html += '</div>'
  m.innerHTML = html
  document.body.appendChild(m)
}

function closeModal(){
  var el = document.getElementById('infoModal')
  if (el) el.remove()
}

function getOwner(team){
  for(var i=0;i<DATA.players.length;i++){
    if(DATA.players[i].teams.indexOf(team)!==-1){
      return {name:DATA.players[i].name, initial:['N','J','J','L'][i], color:['#3b82f6','#ef4444','#f59e0b','#8b5cf6'][i]}
    }
  }
  return null
}

function ownerBadge(team){
  var o=getOwner(team)
  if(!o) return ''
  return '<span style="display:inline-flex;width:16px;height:16px;border-radius:50%;background:'+o.color+';color:#fff;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;flex-shrink:0;margin-right:.3rem">'+o.initial+'</span>'
}
</script>
</body>
</html>
